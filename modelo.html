<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de la Modelo</title>
    <style>
        /* Estilos generales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #0b0b0c;
            color: #ffffff;
            padding-bottom: 90px; /* Colchón para la barra de navegación */
            overflow-x: hidden;    /* Bloquea el movimiento horizontal lateral */
            width: 100vw;          
        }

        /* Cabecera con Botón Volver */
        header {
            background-color: #16161a;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1f1f24;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ff2a74;
            font-size: 1.4rem;
            cursor: pointer;
            margin-right: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        /* Banner y Portada de la Modelo */
        .profile-header {
            position: relative;
            background-color: #16161a;
            border-bottom: 1px solid #1f1f24;
            overflow: hidden; 
        }

        .profile-banner {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            filter: blur(10px) brightness(0.5);
            transform: scale(1.1); 
        }

        .profile-info {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px; 
            padding: 0 15px 20px 15px;
            text-align: center;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #0b0b0c;
            object-fit: cover;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 10px;
            color: #ffffff;
        }

        .profile-bio {
            font-size: 0.85rem;
            color: #8a8a93;
            max-width: 400px;
            margin: 8px auto 0 auto;
            line-height: 1.4;
        }

        /* Pestañas de Navegación */
        .tabs {
            display: flex;
            background-color: #111115;
            border-bottom: 1px solid #1f1f24;
            position: sticky;
            top: 55px;
            z-index: 90;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #8a8a93;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 15px 0;
            cursor: pointer;
            text-align: center;
            transition: color 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #ff2a74;
            border-bottom-color: #ff2a74;
        }

        /* Contenido de las pestañas */
        .tab-content {
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .content-section {
            display: none; 
        }

        .content-section.active {
            display: block;
        }

        /* Cuadrícula de Fotos */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            background-color: #16161a;
            border: 1px solid #1f1f24;
            transition: opacity 0.2s;
        }

        .gallery-item:active {
            opacity: 0.7;
        }

        /* Contenedor de Videos */
        .videos-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* CAPA DE PUBLICIDAD SOBRE EL VIDEO */
        .video-card {
            position: relative; /* Esencial para posicionar el botón encima */
            background-color: #16161a;
            border-radius: 10px;
            border: 1px solid #232329;
            overflow: hidden;
        }

        .video-card video, .video-card iframe {
            width: 100%;
            display: block;
            background-color: #000;
        }

        /* Capa invisible/falsa que atrapa el clic de reproducción */
        .ad-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Icono de play premium falso flotando en el medio */
        .ad-play-btn {
            width: 65px;
            height: 65px;
            background-color: rgba(255, 42, 116, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 1.6rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* Deja pasar el clic al contenedor ad-overlay */
        }

        .empty-message {
            text-align: center;
            color: #8a8a93;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        .empty-message span {
            display: block;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* ==========================================
           VISOR PANTALLA COMPLETA
           ========================================== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            touch-action: none; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s ease-out, opacity 0.12s ease-out; 
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 2.2rem;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1010;
        }

        /* ==========================================
           BARRA DE NAVEGACIÓN INFERIOR
           ========================================== */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: #111115;
            border-top: 1px solid #1f1f24;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.4);
        }

        .nav-item {
            color: #8a8a93;
            text-decoration: none;
            font-size: 0.75rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 25%;
            height: 100%;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="window.history.back()">⬅</button>
        <h1 id="header-title">Perfil</h1>
    </header>

    <section class="profile-header">
        <div class="profile-banner" id="profile-banner"></div>
        <div class="profile-info">
            <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
            <h2 class="profile-name" id="profile-name">Cargando...</h2>
            <p class="profile-bio" id="profile-bio"></p>
        </div>
    </section>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('fotos', this)">📷 Fotos</button>
        <button class="tab-btn" onclick="switchTab('videos', this)">🎬 Videos</button>
    </nav>

    <main class="tab-content">
        <section id="sec-fotos" class="content-section active">
            <div class="gallery-grid" id="gallery-container"></div>
        </section>

        <section id="sec-videos" class="content-section">
            <div class="videos-list" id="videos-container"></div>
        </section>
    </main>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img src="" alt="Ampliada" id="lightbox-img" class="lightbox-img">
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
        <a href="chicas.html" class="nav-item"><span class="nav-icon">🔥</span><span>Mis Chicas</span></a>
        <a href="buscar.html" class="nav-item"><span class="nav-icon">🔍</span><span>Buscar</span></a>
        <a href="info.html" class="nav-item"><span class="nav-icon">ℹ️</span><span>Info</span></a>
    </nav>

    <script src="db.js"></script>

    <script>
        let fotosArray = []; 
        let currentFotoIndex = 0; 

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // 🔗 CONFIGURACIÓN DE TU ENLACE DE PUBLICIDAD
        // Reemplaza esta URL por tu enlace de Smartlink, Adsterra, Popads o tu red publicitaria
        const URL_PUBLICIDAD = "https://www.ejemplo.com/tu-enlace-de-publicidad";

        function switchTab(tabName, buttonElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            buttonElement.classList.add('active');
            document.getElementById(`sec-${tabName}`).classList.add('active');
        }

        // CONTROL DE REPRODUCCIÓN E INTERCEPTOR DE ANUNCIOS
        function manejarPlayVideo(elementoCapa) {
            // 1. Abrir el anuncio en una pestaña externa del celular
            window.open(URL_PUBLICIDAD, '_blank');

            // 2. Remover la capa/botón falso inmediatamente para liberar el reproductor
            const contenedorCard = elementoCapa.parentElement;
            elementoCapa.remove();

            // 3. Buscar si es un video local (.mp4) y darle play de forma automática
            const videoReal = contenedorCard.querySelector('video');
            if (videoReal) {
                videoReal.play();
            }
        }

        // VISOR TÁCTIL (LIGHTBOX)
        function openLightbox(index) {
            currentFotoIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = fotosArray[currentFotoIndex];
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function changeImage(direction) {
            currentFotoIndex += direction;
            if (currentFotoIndex < 0) currentFotoIndex = fotosArray.length - 1; 
            else if (currentFotoIndex >= fotosArray.length) currentFotoIndex = 0; 

            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.style.opacity = '0.3';
            lightboxImg.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                lightboxImg.src = fotosArray[currentFotoIndex];
                lightboxImg.style.opacity = '1';
                lightboxImg.style.transform = 'scale(1)';
            }, 120);
        }

        // DETECTOR DE SWIPE
        const lightboxArea = document.getElementById('lightbox');
        lightboxArea.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].clientX;
            touchStartY = e.changedTouches[0].clientY;
        }, { passive: true });

        lightboxArea.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThresholdX = 40; 
            const swipeThresholdY = 60; 
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > swipeThresholdX) changeImage(1);  
                else if (diffX < -swipeThresholdX) changeImage(-1); 
            } else {
                if (Math.abs(diffY) > swipeThresholdY) closeLightbox();
            }
        }

        // CARGAR BASE DE DATOS
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modeloId = parseInt(urlParams.get('id'));

            if (typeof modelosDB === 'undefined' || !Array.isArray(modelosDB)) {
                alert("Error al cargar la base de datos.");
                return;
            }

            const modelo = modelosDB.find(m => m.id === modeloId);
            if (!modelo) {
                document.getElementById('profile-name').textContent = "Modelo no encontrada";
                return;
            }

            fotosArray = modelo.fotos || [];
            document.getElementById('header-title').textContent = modelo.nombre;
            document.getElementById('profile-name').textContent = modelo.nombre;
            document.getElementById('profile-avatar').src = modelo.fotoPortada;
            document.getElementById('profile-banner').style.backgroundImage = `url('${modelo.fotoPortada}')`;
            document.getElementById('profile-bio').textContent = modelo.descripcion || "¡Bienvenido a mi galería de contenido exclusivo!";

            // Renderizar Fotos
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = "";
            if (fotosArray.length > 0) {
                fotosArray.forEach((fotoUrl, index) => {
                    const img = document.createElement('img');
                    img.src = fotoUrl;
                    img.className = 'gallery-item';
                    img.onclick = () => openLightbox(index);
                    galleryContainer.appendChild(img);
                });
            } else {
                galleryContainer.innerHTML = `<div class="empty-message" style="grid-column: span 3;"><span>📷</span>Próximamente se subirán fotos exclusivas.</div>`;
            }

            // Renderizar Videos con Capa de Anuncio Interceptora
            const videosContainer = document.getElementById('videos-container');
            videosContainer.innerHTML = "";

            if (modelo.videos && modelo.videos.length > 0) {
                modelo.videos.forEach(videoUrl => {
                    const videoCard = document.createElement('div');
                    videoCard.className = 'video-card';
                    
                    // Contenido del reproductor (Iframe o Video HTML5)
                    let reproductorHTML = '';
                    if (videoUrl.includes('embed') || videoUrl.includes('burstcloud')) {
                        reproductorHTML = `<iframe src="${videoUrl}" width="100%" height="300" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
                    } else {
                        reproductorHTML = `<video controls playsinline preload="metadata" style="max-height: 400px;"><source src="${videoUrl}" type="video/mp4"></video>`;
                    }

                    // Se inyecta el reproductor junto con la capa falsa táctil (.ad-overlay)
                    videoCard.innerHTML = `
                        <div class="ad-overlay" onclick="manejarPlayVideo(this)">
                            <div class="ad-play-btn">▶</div>
                        </div>
                        ${reproductorHTML}
                    `;
                    videosContainer.appendChild(videoCard);
                });
            } else {
                videosContainer.innerHTML = `<div class="empty-message"><span>🎬</span>Próximamente se subirán videos exclusivos.</div>`;
            }
        });
    </script>
</body>
</html>
