<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil Premium de la Modelo</title>
    <style>
        /* =========================================
           1. ESTILOS GENERALES Y RESETEOS
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #060608; /* Un negro más profundo */
            color: #ececec; 
            padding-bottom: 90px; /* Espacio para el nav inferior */
            overflow-x: hidden; 
            width: 100vw; 
            line-height: 1.5;
        }

        /* Fuents de Google - Opcional, para un look más moderno */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        /* =========================================
           2. CABECERA (HEADER) - Rediseño Elegante
           ========================================= */
        header { 
            background: rgba(18, 18, 22, 0.95); /* Semitransparente blur */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .back-btn { 
            background: rgba(255, 2a, 116, 0.1); 
            border: none; 
            color: #ff2a74; 
            font-size: 1.1rem; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        header h1 { 
            font-size: 1.05rem; 
            font-weight: 700; 
            color: #ffffff; 
            flex-grow: 1; 
            text-align: center;
            margin-right: 36px; /* Balancear el espacio del botón de atrás */
        }

        /* =========================================
           3. CABECERA DEL PERFIL - ¡IMPACTO TOTAL!
           ========================================= */
        .profile-header { 
            position: relative; 
            width: 100%;
            height: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            overflow: visible; /* Permitir que el avatar sobresalga */
        }

        /* El Banner ahora es una imagen de fondo difuminada y oscurecida */
        .profile-banner { 
            width: 100%; 
            height: 180px; /* Más alto */
            background-size: cover; 
            background-position: center; 
            filter: blur(15px); /* Más blur */
            transform: scale(1.1); /* Prevenir bordes blancos por blur */
            opacity: 0.4; /* Muy sutil */
        }

        /* El área de información flotante */
        .profile-info-container {
            position: relative;
            margin-top: -110px; /* Subir la información sobre el banner */
            padding: 0 16px 24px 16px;
            text-align: center;
            z-index: 10;
        }

        /* Avatar: Grande, con borde y sombra premium */
        .profile-avatar { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 5px solid #060608; 
            object-fit: cover; 
            background-color: #000; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); 
        }

        /* Nombre: Grande, bold y elegante */
        .profile-name { 
            font-size: 1.8rem; 
            font-weight: 800; 
            margin-top: 14px; 
            color: #ffffff; 
            letter-spacing: -0.5px;
        }

        /* Subtítulo o Username (Simulado) */
        .profile-username {
            font-size: 0.9rem;
            color: #8a8a93;
            margin-top: 2px;
            margin-bottom: 16px;
        }

        /* =========================================
           4. BOTONES DE REDES SOCIALES
           ========================================= */
        .social-links { 
            display: flex; 
            gap: 12px; 
            margin-top: 16px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .social-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-decoration: none; 
            color: #fff; 
            transition: all 0.2s ease; 
            border: 1px solid transparent;
        }
        .social-btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-onlyfans { 
            background-color: transparent; 
            border-color: rgba(0, 175, 240, 0.4); 
            color: #00aff0;
        }
        .btn-onlyfans:hover, .btn-onlyfans:active {
            background-color: #00aff0;
            color: #ffffff;
        }

        .btn-instagram { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }

        /* =========================================
           5. PESTAÑAS (TABS) - Rediseño Minimalista
           ========================================= */
        .tabs { 
            display: flex; 
            background-color: rgba(18, 18, 22, 0.98); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
            position: sticky; 
            top: 61px; /* Justo debajo del header */
            z-index: 900; 
            padding: 0 10px;
        }
        .tab-btn { 
            flex: 1; 
            background: none; 
            border: none; 
            color: #8a8a93; 
            font-weight: 600; 
            font-size: 0.9rem; 
            padding: 16px 0; 
            cursor: pointer; 
            transition: color 0.2s, font-weight 0.2s;
            position: relative;
        }
        
        /* Indicador de pestaña activa (línea inferior animada) */
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background-color: #ff2a74;
            transition: width 0.3s ease, left 0.3s ease;
            transform: translateX(-50%);
            border-radius: 3px 3px 0 0;
        }

        .tab-btn.active { 
            color: #ffffff; 
            font-weight: 700;
        }
        
        .tab-btn.active::after {
            width: 40px; /* O el tamaño que prefieras */
        }

        .content-section { display: none; padding: 12px; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           6. GALERÍA DE FOTOS (GRID)
           ========================================= */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
        }
        .gallery-item { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 8px; /* Más redondeado */
            cursor: pointer; 
            transition: opacity 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .gallery-item:active { opacity: 0.7; }

        /* =========================================
           7. LISTA DE VÍDEOS (CARDS)
           ========================================= */
        .videos-list { display: flex; flex-direction: column; gap: 12px; }
        
        .video-item-card { 
            background-color: #121216; /* Más oscuro */
            border: 1px solid rgba(255, 255, 255, 0.04); 
            border-radius: 12px; /* Más redondeado */
            overflow: hidden; 
            transition: all 0.2s ease;
        }
        .video-item-card:active { background-color: #1a1a20; }

        .video-play-btn { 
            width: 100%; 
            padding: 20px; /* Más espacio */
            background-color: transparent; 
            color: #ffffff; 
            border: none; 
            font-size: 0.95rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
            text-align: left; 
        }
        .video-play-btn span.icon { 
            color: rgba(255, 255, 255, 0.3); 
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .video-card-body { 
            width: 100%; 
            display: none; 
            background-color: #000; 
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 por defecto */
            position: relative;
        }
        .video-card-body.active { display: block; height: 0; }

        .video-card-body video, .video-card-body iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            background-color: #000; 
        }

        /* =========================================
           8. MODAL VISOR DE IMÁGENES
           ========================================= */
        .modal-viewer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: center; }
        .modal-viewer.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-img { max-width: 95%; max-height: 85vh; object-fit: contain; border-radius: 8px; user-select: none; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        .close-modal { position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.7); font-size: 2rem; cursor: pointer; z-index: 2001; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* =========================================
           9. BARRA DE NAVEGACIÓN INFERIOR
              ¡NO MODIFICADA, TAL COMO PEDISTE!
           ========================================= */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background-color: #111115; border-top: 1px solid #1f1f24; display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: #8a8a93; text-decoration: none; font-size: 0.75rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; }
        /* Puedes añadir aquí .nav-item span para los emojis/iconos si lo deseas */
    </style>
</head>
<body>

    <header>
        <a href="javascript:void(0)" class="back-btn" onclick="goBack()">⬅</a>
        <h1 id="header-title">Perfil</h1>
    </header>

    <!-- Sección de Cabecera del Perfil Rediseñada -->
    <section class="profile-header">
        <div class="profile-banner" id="profile-banner"></div>
        
        <div class="profile-info-container">
            <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
            <h2 class="profile-name" id="profile-name">Cargando...</h2>
            <p class="profile-username" id="profile-username">@loading</p>
            
            <div class="social-links" id="social-links"></div>
        </div>
    </section>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('fotos', this)">📷 Fotos</button>
        <button class="tab-btn" onclick="switchTab('videos', this)">🎬 Videos</button>
    </nav>

    <main class="tab-content">
        <section id="sec-fotos" class="content-section active">
            <div class="gallery-grid" id="gallery-container"></div>
        </section>
        <section id="sec-videos" class="content-section">
            <div class="videos-list" id="videos-container"></div>
        </section>
    </main>

    <!-- Modal Visor Limpio -->
    <div class="modal-viewer" id="modal-viewer">
        <span class="close-modal" onclick="closeViewer()">&times;</span>
        <img src="" id="modal-img" class="modal-img">
    </div>

    <!-- Barra Inferior INTACTA -->
    <nav class="nav-bar">
        <a href="index.html" class="nav-item">🏠<span>Home</span></a>
        <a href="chicas.html" class="nav-item">🔥<span>Mis Chicas</span></a>
        <a href="buscar.html" class="nav-item">🔍<span>Buscar</span></a>
        <a href="info.html" class="nav-item">ℹ️<span>Info</span></a>
    </nav>

    <script src="db.js"></script>
    <script>
        let currentFotos = [];
        let currentIndex = 0;

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        }

        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if (btn) {
                btn.classList.add('active');
            } else {
                const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.toLowerCase().includes(tabName));
                if (targetBtn) targetBtn.classList.add('active');
            }

            document.getElementById(`sec-${tabName}`).classList.add('active');
            sessionStorage.setItem('activeTab', tabName);
        }

        // Visor de Imágenes
        function openViewer(index) {
            currentIndex = index;
            document.getElementById('modal-img').src = currentFotos[currentIndex];
            document.getElementById('modal-viewer').classList.add('active');
            // Bloquear scroll del body
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('modal-viewer').classList.remove('active');
            // Restaurar scroll del body
            document.body.style.overflow = '';
        }

        function navigateImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentFotos.length - 1;
            if (currentIndex >= currentFotos.length) currentIndex = 0;
            // Animación sutil al cambiar de imagen
            const img = document.getElementById('modal-img');
            img.style.opacity = 0.5;
            setTimeout(() => {
                img.src = currentFotos[currentIndex];
                img.style.opacity = 1;
            }, 100);
        }

        // Gestos táctiles
        let touchStartX = 0;
        let touchEndX = 0;
        const modal = document.getElementById('modal-viewer');

        modal.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
        }, {passive: true});

        modal.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 40) navigateImage(1);
            if (touchEndX - touchStartX > 40) navigateImage(-1);
        }, {passive: true});

        // Reproducción directa de vídeo
        function cargarYReproducirVideo(index, videoUrl, containerElement, btnElement) {
            btnElement.style.display = 'none';
            containerElement.classList.add('active');

            const isEmbed = videoUrl.includes('/embed/') || videoUrl.includes('burstcloud.co');

            if (isEmbed) {
                containerElement.innerHTML = `
                    <iframe 
                        src="${videoUrl}" 
                        allow="autoplay; fullscreen; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            } else {
                containerElement.innerHTML = `
                    <video controls playsinline webkit-playsinline="true" controlsList="nodownload" autoplay style="position: absolute; top: 0; left: 0; width:100%; height:100%; background:#000;">
                        <source src="${videoUrl}" type="video/mp4">
                        Tu navegador no soporta la reproducción de video.
                    </video>
                `;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modeloId = parseInt(urlParams.get('id'));
            const modelo = typeof modelosDB !== 'undefined' ? modelosDB.find(m => m.id === modeloId) : null;

            if (!modelo) {
                document.getElementById('profile-name').textContent = "Modelo no encontrada";
                document.getElementById('header-title').textContent = "Error";
                return;
            };

            document.getElementById('header-title').textContent = modelo.nombre;
            document.getElementById('profile-name').textContent = modelo.nombre;
            // Simular un username basado en el nombre
            document.getElementById('profile-username').textContent = `@${modelo.nombre.toLowerCase().replace(/\s+/g, '')}`;
            
            document.getElementById('profile-avatar').src = modelo.fotoPortada;
            // El banner usa la misma foto pero con filtro blur/oscuro
            document.getElementById('profile-banner').style.backgroundImage = `url('${modelo.fotoPortada}')`;

            // Renderizar Redes Sociales
            const socialContainer = document.getElementById('social-links');
            socialContainer.innerHTML = "";

            if (modelo.onlyfans && modelo.onlyfans !== "Desconocido") {
                const ofLink = document.createElement('a');
                ofLink.href = modelo.onlyfans;
                ofLink.target = "_blank";
                ofLink.className = "social-btn btn-onlyfans";
                ofLink.innerHTML = "💙 OnlyFans";
                socialContainer.appendChild(ofLink);
            }

            if (modelo.instagram && modelo.instagram !== "Desconocido") {
                const igLink = document.createElement('a');
                igLink.href = modelo.instagram;
                igLink.target = "_blank";
                igLink.className = "social-btn btn-instagram";
                igLink.innerHTML = "📸 Instagram";
                socialContainer.appendChild(igLink);
            }

            // Limpieza previa
            const gallery = document.getElementById('gallery-container');
            const videosContainer = document.getElementById('videos-container');
            gallery.innerHTML = "";
            videosContainer.innerHTML = "";

            // Cargar Fotos
            currentFotos = modelo.fotos || [];
            if (currentFotos.length === 0) {
                 gallery.innerHTML = "<p style='grid-column: 1 / -1; text-align:center; padding:30px; color:#8a8a93;'>No hay fotos aún.</p>";
            } else {
                currentFotos.forEach((foto, idx) => {
                    const img = document.createElement('img');
                    img.src = foto;
                    img.className = 'gallery-item';
                    img.onclick = () => openViewer(idx);
                    gallery.appendChild(img);
                });
            }

            // Cargar Lista de Vídeos Numerados
            const videosList = modelo.videos || [];
            if (videosList.length === 0) {
                videosContainer.innerHTML = "<p style='text-align:center; padding:30px; color:#8a8a93;'>No hay vídeos disponibles.</p>";
            } else {
                videosList.forEach((videoUrl, index) => {
                    const videoNum = index + 1;

                    const card = document.createElement('div');
                    card.className = 'video-item-card';

                    const btn = document.createElement('button');
                    btn.className = 'video-play-btn';
                    btn.innerHTML = `
                        <span>▶️ Ver Vídeo ${videoNum}</span>
                        <span class="icon">🎬</span>
                    `;

                    const body = document.createElement('div');
                    body.className = 'video-card-body';

                    btn.onclick = () => cargarYReproducirVideo(index, videoUrl, body, btn);

                    card.appendChild(btn);
                    card.appendChild(body);
                    videosContainer.appendChild(card);
                });
            }

            // Restaurar pestaña activa previa
            const savedTab = sessionStorage.getItem('activeTab');
            if (savedTab === 'videos') {
                const videoTabBtn = document.querySelectorAll('.tab-btn')[1];
                switchTab('videos', videoTabBtn);
            }
        });
    </script>
</body>
</html>
