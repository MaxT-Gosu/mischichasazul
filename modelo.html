<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de la Modelo</title>
    <style>
        /* Estilos generales */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0c; color: #ffffff; padding-bottom: 90px; overflow-x: hidden; width: 100vw; }

        /* Cabecera */
        header { background-color: #16161a; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #1f1f24; position: sticky; top: 0; z-index: 100; }
        .back-btn { background: none; border: none; color: #ff2a74; font-size: 1.4rem; cursor: pointer; margin-right: 15px; text-decoration: none; display: flex; align-items: center; }
        header h1 { font-size: 1.2rem; font-weight: bold; color: #ffffff; }

        /* Banner y Portada */
        .profile-header { position: relative; background-color: #16161a; border-bottom: 1px solid #1f1f24; overflow: hidden; }
        .profile-banner { width: 100%; height: 140px; background-size: cover; background-position: center; filter: blur(10px) brightness(0.5); transform: scale(1.1); }
        .profile-info { position: relative; display: flex; flex-direction: column; align-items: center; margin-top: -60px; padding: 0 15px 20px 15px; text-align: center; }
        .profile-avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #0b0b0c; object-fit: cover; background-color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .profile-name { font-size: 1.4rem; font-weight: bold; margin-top: 10px; color: #ffffff; }

        /* Tabs */
        .tabs { display: flex; background-color: #111115; border-bottom: 1px solid #1f1f24; position: sticky; top: 55px; z-index: 90; }
        .tab-btn { flex: 1; background: none; border: none; color: #8a8a93; font-weight: bold; font-size: 0.9rem; padding: 15px 0; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ff2a74; border-bottom-color: #ff2a74; }
        .content-section { display: none; padding: 10px; }
        .content-section.active { display: block; }

        /* Galería y Videos */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .gallery-item { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .video-card { background-color: #16161a; border-radius: 10px; border: 1px solid #232329; overflow: hidden; margin-bottom: 15px; }
        .video-card video { width: 100%; max-height: 450px; display: block; background-color: #000; }

        /* Modal Visor de Imágenes (Swipe / Deslizar) */
        .modal-viewer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-viewer.active { display: flex; }
        .modal-img { max-width: 95%; max-height: 85vh; object-fit: contain; border-radius: 8px; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; z-index: 2001; }
        .nav-modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; font-size: 2rem; padding: 10px 15px; cursor: pointer; border-radius: 50%; user-select: none; }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* Nav inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background-color: #111115; border-top: 1px solid #1f1f24; display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: #8a8a93; text-decoration: none; font-size: 0.75rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; }
    </style>
</head>
<body>

    <header>
        <a href="javascript:void(0)" class="back-btn" onclick="goBack()">⬅</a>
        <h1 id="header-title">Perfil</h1>
    </header>

    <section class="profile-header">
        <div class="profile-banner" id="profile-banner"></div>
        <div class="profile-info">
            <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
            <h2 class="profile-name" id="profile-name">Cargando...</h2>
        </div>
    </section>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('fotos', this)">📷 Fotos</button>
        <button class="tab-btn" onclick="switchTab('videos', this)">🎬 Videos</button>
    </nav>

    <main class="tab-content">
        <section id="sec-fotos" class="content-section active">
            <div class="gallery-grid" id="gallery-container"></div>
        </section>
        <section id="sec-videos" class="content-section">
            <div class="videos-list" id="videos-container"></div>
        </section>
    </main>

    <!-- Modal Visor para Deslizar Fotos -->
    <div class="modal-viewer" id="modal-viewer">
        <span class="close-modal" onclick="closeViewer()">&times;</span>
        <button class="nav-modal-btn prev-btn" onclick="navigateImage(-1)">❮</button>
        <img src="" id="modal-img" class="modal-img">
        <button class="nav-modal-btn next-btn" onclick="navigateImage(1)">❯</button>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">🏠<span>Home</span></a>
        <a href="chicas.html" class="nav-item">🔥<span>Mis Chicas</span></a>
        <a href="buscar.html" class="nav-item">🔍<span>Buscar</span></a>
        <a href="info.html" class="nav-item">ℹ️<span>Info</span></a>
    </nav>

    <script src="db.js"></script>
    <script>
        let currentFotos = [];
        let currentIndex = 0;

        // Función Segura de Retroceso (Resuelve la congelación)
        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        }

        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`sec-${tabName}`).classList.add('active');
        }

        // Visor de Imágenes y Desplazamiento (Swipe)
        function openViewer(index) {
            currentIndex = index;
            document.getElementById('modal-img').src = currentFotos[currentIndex];
            document.getElementById('modal-viewer').classList.add('active');
        }

        function closeViewer() {
            document.getElementById('modal-viewer').classList.remove('active');
        }

        function navigateImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentFotos.length - 1;
            if (currentIndex >= currentFotos.length) currentIndex = 0;
            document.getElementById('modal-img').src = currentFotos[currentIndex];
        }

        // Detección de Gestos Táctiles (Swipe en móvil)
        let touchStartX = 0;
        let touchEndX = 0;
        const modal = document.getElementById('modal-viewer');

        modal.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        modal.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) navigateImage(1);  // Deslizar Izquierda
            if (touchEndX - touchStartX > 50) navigateImage(-1); // Deslizar Derecha
        });

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modeloId = parseInt(urlParams.get('id'));
            const modelo = typeof modelosDB !== 'undefined' ? modelosDB.find(m => m.id === modeloId) : null;

            if (!modelo) return;

            document.getElementById('header-title').textContent = modelo.nombre;
            document.getElementById('profile-name').textContent = modelo.nombre;
            document.getElementById('profile-avatar').src = modelo.fotoPortada;
            document.getElementById('profile-banner').style.backgroundImage = `url('${modelo.fotoPortada}')`;

            // Fotos con visor interactivo
            currentFotos = modelo.fotos || [];
            const gallery = document.getElementById('gallery-container');
            currentFotos.forEach((foto, idx) => {
                const img = document.createElement('img');
                img.src = foto;
                img.className = 'gallery-item';
                img.onclick = () => openViewer(idx);
                gallery.appendChild(img);
            });

            // Vídeos optimizados con HTML5 Video Directo
            const videosContainer = document.getElementById('videos-container');
            (modelo.videos || []).forEach(videoUrl => {
                videosContainer.innerHTML += `
                    <div class="video-card">
                        <video controls preload="metadata" playsinline>
                            <source src="${videoUrl}" type="video/mp4">
                            Tu navegador no soporta reproducción de vídeo.
                        </video>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
