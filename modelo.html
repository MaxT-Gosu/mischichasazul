<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de la Modelo</title>
    <style>
        /* Estilos generales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b0c;
            color: #ffffff;
            padding-bottom: 90px; /* Colchón para la barra de navegación */
        }

        /* Cabecera con Botón Volver */
        header {
            background-color: #16161a;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1f1f24;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ff2a74;
            font-size: 1.4rem;
            cursor: pointer;
            margin-right: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        /* Banner y Portada de la Modelo */
        .profile-header {
            position: relative;
            background-color: #16161a;
            border-bottom: 1px solid #1f1f24;
        }

        /* Un fondo borroso estético usando su misma foto */
        .profile-banner {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            filter: blur(10px) brightness(0.5);
            transform: scale(1.1);
            overflow: hidden;
        }

        .profile-info {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px; /* Sube la info sobre el banner borroso */
            padding: 0 15px 20px 15px;
            text-align: center;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #0b0b0c;
            object-fit: cover;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 10px;
            color: #ffffff;
        }

        .profile-bio {
            font-size: 0.85rem;
            color: #8a8a93;
            max-width: 400px;
            margin: 8px auto 0 auto;
            line-height: 1.4;
        }

        /* Pestañas de Navegación del Perfil (Fotos / Videos) */
        .tabs {
            display: flex;
            background-color: #111115;
            border-bottom: 1px solid #1f1f24;
            position: sticky;
            top: 55px;
            z-index: 90;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #8a8a93;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 15px 0;
            cursor: pointer;
            text-align: center;
            transition: color 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #ff2a74;
            border-bottom-color: #ff2a74;
        }

        /* Contenedor de contenido de las pestañas */
        .tab-content {
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .content-section {
            display: none; /* Oculto por defecto, JS lo activa */
        }

        .content-section.active {
            display: block;
        }

        /* Cuadrícula de Fotos (3 columnas en móvil) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1; /* Cuadrado perfecto estilo Instagram */
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            background-color: #16161a;
            border: 1px solid #1f1f24;
            transition: opacity 0.2s;
        }

        .gallery-item:active {
            opacity: 0.7;
        }

        /* Contenedor de Videos (Diseño en Lista vertical) */
        .videos-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-card {
            background-color: #16161a;
            border-radius: 10px;
            border: 1px solid #232329;
            overflow: hidden;
        }

        .video-card video {
            width: 100%;
            display: block;
            max-height: 400px;
            background-color: #000;
        }

        /* Mensajes de "No hay contenido" */
        .empty-message {
            text-align: center;
            color: #8a8a93;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        .empty-message span {
            display: block;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Visor de imágenes en Pantalla Completa (LightBox) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* ==========================================
           BARRA DE NAVEGACIÓN INFERIOR
           ========================================== */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: #111115;
            border-top: 1px solid #1f1f24;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.4);
        }

        .nav-item {
            color: #8a8a93;
            text-decoration: none;
            font-size: 0.75rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 25%;
            height: 100%;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }

        .nav-item:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <!-- Cabecera de Navegación -->
    <header>
        <!-- Retorna a la página anterior -->
        <button class="back-btn" onclick="window.history.back()">⬅</button>
        <h1 id="header-title">Perfil</h1>
    </header>

    <!-- Datos Dinámicos del Perfil de la Modelo -->
    <section class="profile-header">
        <div class="profile-banner" id="profile-banner"></div>
        <div class="profile-info">
            <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
            <h2 class="profile-name" id="profile-name">Cargando...</h2>
            <p class="profile-bio" id="profile-bio"></p>
        </div>
    </section>

    <!-- Pestañas (Tabs) de Contenido -->
    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('fotos', this)">📷 Fotos</button>
        <button class="tab-btn" onclick="switchTab('videos', this)">🎬 Videos</button>
    </nav>

    <!-- Secciones de Contenido -->
    <main class="tab-content">
        
        <!-- Sección de Galería de Fotos -->
        <section id="sec-fotos" class="content-section active">
            <div class="gallery-grid" id="gallery-container"></div>
        </section>

        <!-- Sección de Videos -->
        <section id="sec-videos" class="content-section">
            <div class="videos-list" id="videos-container"></div>
        </section>

    </main>

    <!-- Visor Pantalla Completa (Lightbox) -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="Ampliada" id="lightbox-img" class="lightbox-img">
    </div>

    <!-- ==========================================
       MENÚ INFERIOR TÁCTIL
       ========================================== -->
    <nav class="nav-bar">
        <!-- 1. Home -->
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        
        <!-- 2. Mis Chicas -->
        <a href="chicas.html" class="nav-item">
            <span class="nav-icon">🔥</span>
            <span>Mis Chicas</span>
        </a>
        
        <!-- 3. Buscar -->
        <a href="buscar.html" class="nav-item">
            <span class="nav-icon">🔍</span>
            <span>Buscar</span>
        </a>
        
        <!-- 4. Info -->
        <a href="info.html" class="nav-item">
            <span class="nav-icon">ℹ️</span>
            <span>Info</span>
        </a>
    </nav>

    <!-- 1. Importación de tu base de datos central -->
    <script src="db.js"></script>

    <!-- 2. Motor Lector de Perfil Individual -->
    <script>
        // Función para cambiar entre pestañas Fotos y Videos
        function switchTab(tabName, buttonElement) {
            // Desactivar botones de pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Desactivar secciones de contenido
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));

            // Activar la pestaña y sección correspondientes
            buttonElement.classList.add('active');
            document.getElementById(`sec-${tabName}`).classList.add('active');
        }

        // Funciones para el Visor de Fotos en Pantalla Completa (Lightbox)
        function openLightbox(imageUrl) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageUrl;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Lector de parámetros de URL y renderizador de datos
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Obtener el ID que se pasa en el enlace (ej: modelo.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const modeloId = parseInt(urlParams.get('id'));

            // Verificar si la base de datos se cargó correctamente
            if (typeof modelosDB === 'undefined' || !Array.isArray(modelosDB)) {
                alert("Error al cargar la base de datos.");
                return;
            }

            // 2. Buscar a la modelo seleccionada en el array de db.js
            const modelo = modelosDB.find(m => m.id === modeloId);

            if (!modelo) {
                document.getElementById('profile-name').textContent = "Modelo no encontrada";
                return;
            }

            // 3. Inyectar sus datos básicos en el perfil
            document.getElementById('header-title').textContent = modelo.nombre;
            document.getElementById('profile-name').textContent = modelo.nombre;
            document.getElementById('profile-avatar').src = modelo.fotoPortada;
            // Usamos la misma foto como banner borroso estético de fondo
            document.getElementById('profile-banner').style.backgroundImage = `url('${modelo.fotoPortada}')`;
            document.getElementById('profile-bio').textContent = modelo.descripcion || "¡Bienvenido a mi galería de contenido exclusivo!";

            // 4. Renderizar su Galería de Fotos
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = "";

            if (modelo.fotos && modelo.fotos.length > 0) {
                modelo.fotos.forEach(fotoUrl => {
                    const img = document.createElement('img');
                    img.src = fotoUrl;
                    img.className = 'gallery-item';
                    img.alt = `Contenido de ${modelo.nombre}`;
                    // Al tocar la foto, se expande a pantalla completa
                    img.onclick = () => openLightbox(fotoUrl);
                    galleryContainer.appendChild(img);
                });
            } else {
                galleryContainer.innerHTML = `
                    <div class="empty-message" style="grid-column: span 3;">
                        <span>📷</span>
                        Próximamente se subirán fotos exclusivas.
                    </div>
                `;
            }

            // 5. Renderizar su Lista de Videos
            const videosContainer = document.getElementById('videos-container');
            videosContainer.innerHTML = "";

            if (modelo.videos && modelo.videos.length > 0) {
                modelo.videos.forEach(videoUrl => {
                    const videoCard = document.createElement('div');
                    videoCard.className = 'video-card';
                    
                    // Configuración del reproductor de video nativo
                    videoCard.innerHTML = `
                        <video controls playsinline preload="metadata">
                            <source src="${videoUrl}" type="video/mp4">
                            Tu celular no soporta la reproducción de video.
                        </video>
                    `;
                    videosContainer.appendChild(videoCard);
                });
            } else {
                videosContainer.innerHTML = `
                    <div class="empty-message">
                        <span>🎬</span>
                        Próximamente se subirán videos exclusivos.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
